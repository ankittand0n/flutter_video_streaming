<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Namkeen TV">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Namkeen TV</title>
  <link rel="manifest" href="manifest.json">

  <!-- Load runtime configuration (optional, injected by Docker at startup) -->
  <script>
    // Initialize ENV object with defaults
    window.ENV = {
      apiBaseUrl: 'https://admin.namkeentv.com/api',
      storageBaseUrl: 'https://storage.googleapis.com/namkeen-tv'
    };
    
    // Try to load config.js dynamically (only exists in Docker/production)
    (function() {
      var script = document.createElement('script');
      script.src = 'config.js';
      script.onerror = function() {
        console.log('config.js not found, using defaults');
      };
      document.head.appendChild(script);
    })();
  </script>

  <!-- HLS.js for HLS video playback support on web -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <!-- Google Cast SDK for Chromecast support -->
  <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>

  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>
  <script>
    var serviceWorkerVersion = null;
  </script>
</head>
<body>
  <script>
    window.addEventListener('load', function(ev) {
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        }
      });
    });
  </script>
</body>
</html>
