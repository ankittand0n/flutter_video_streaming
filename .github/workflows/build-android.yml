name: Build Android Release APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: frontend
        run: flutter pub get

      # -------------------------------------------------------
      # Optional: decode a release keystore stored as a secret.
      # To enable proper release signing, add these repository
      # secrets in Settings → Secrets and variables → Actions:
      #
      #   KEYSTORE_BASE64    – base64-encoded .jks / .keystore file
      #                        (run: base64 -w 0 my-release.jks)
      #   KEYSTORE_PASSWORD  – store password
      #   KEY_ALIAS          – key alias
      #   KEY_PASSWORD       – key password
      #
      # Leave the secrets unset to fall back to debug signing.
      # -------------------------------------------------------
      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/release.jks
          echo "KEYSTORE_FILE=$RUNNER_TEMP/release.jks" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build release APK
        working-directory: frontend
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: namkeen-tv-release-${{ github.run_number }}
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # Creates a GitHub Release and attaches the APK when you push a tag (e.g. v1.0.0)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
